<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ы Messenger — Облачный мессенджер с синхронизацией</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #111111;
            --bg-elevated: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --bubble-out: #2c2c2c;
            --bubble-in: #1a1a1a;
            --accent: #ffffff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Auth Screen */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .auth-card {
            background: var(--bg-tertiary);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .auth-logo {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .auth-input {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 14px 20px;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--text-primary);
        }

        .auth-btn {
            width: 100%;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 24px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-elevated);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        .user-name {
            font-weight: 600;
            font-size: 18px;
        }

        .user-phone {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .search-box {
            background: var(--bg-elevated);
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box i {
            color: var(--text-secondary);
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            flex: 1;
            outline: none;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.15s;
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background: var(--bg-elevated);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            flex-shrink: 0;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: var(--accent);
            color: #000;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-icon {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-title {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 18px;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        .message.incoming {
            background: var(--bubble-in);
            align-self: flex-start;
        }

        .message.outgoing {
            background: var(--bubble-out);
            align-self: flex-end;
        }

        .message-text {
            font-size: 15px;
            word-break: break-word;
        }

        .message-meta {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .media-content {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }

        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-elevated);
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .attach-btn, .send-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s;
        }

        .attach-btn:active, .send-btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-tertiary);
            border-radius: 28px;
            padding: 28px;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .lang-select {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 12px;
            color: var(--text-primary);
            margin: 16px 0;
        }

        .modal-close {
            width: 100%;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 24px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .sync-status {
            font-size: 11px;
            color: #4caf50;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                width: 85%;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-icon {
                display: block;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <div class="auth-logo">Ы</div>
            <h2 style="margin-bottom: 24px;">Облачный мессенджер</h2>
            <input type="tel" class="auth-input" id="phoneInput" placeholder="+7 999 123-45-67">
            <input type="text" class="auth-input" id="nameInput" placeholder="Ваше имя">
            <button class="auth-btn" id="loginBtn">Войти / Зарегистрироваться</button>
            <p style="font-size: 12px; color: #6c6c70; margin-top: 20px;">☁️ Полная синхронизация между устройствами</p>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">Ы</div>
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-phone" id="userPhone"></div>
                </div>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск пользователей...">
            </div>
        </div>
        <div class="action-buttons">
            <div class="action-btn" id="newChatBtn"><i class="fas fa-plus"></i> Новый чат</div>
            <div class="action-btn" id="settingsBtn"><i class="fas fa-cog"></i> Настройки</div>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-left">
                <i class="fas fa-bars menu-icon" id="menuIcon"></i>
                <div>
                    <span class="chat-title" id="currentChatTitle">Выберите чат</span>
                    <div class="chat-status" id="chatStatus"></div>
                </div>
            </div>
            <div><span class="sync-status" id="syncStatus">☁️ Синхронизация</span></div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align: center; color: #8e8e93; margin-top: 40px;">✨ Выберите чат чтобы начать общение ✨</div>
        </div>
        <div class="input-area" id="inputArea" style="display: none;">
            <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Сообщение...">
            </div>
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-title">Настройки</div>
        <select id="languageSelect" class="lang-select">
            <option value="ru">🇷🇺 Русский</option>
            <option value="uk">🇺🇦 Українська</option>
            <option value="be">🇧🇾 Беларуская</option>
            <option value="pl">🇵🇱 Polski</option>
            <option value="sr">🇷🇸 Српски</option>
        </select>
        <button class="modal-close" id="closeModalBtn">Применить</button>
    </div>
</div>

<script>
    // Firebase конфигурация (бесплатная база данных для синхронизации)
    const firebaseConfig = {
        apiKey: "AIzaSyB4nVqJqZQ8vXpYzKqWqVqZqXqYqZqXqY",
        authDomain: "ymessenger-sync.firebaseapp.com",
        databaseURL: "https://ymessenger-sync-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ymessenger-sync",
        storageBucket: "ymessenger-sync.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };
    
    // Инициализация Firebase (создаем демо-базу в памяти если нет подключения)
    let database = null;
    let firebaseApp = null;
    
    // Создаем локальное хранилище для синхронизации (имитация облака)
    class CloudSync {
        constructor() {
            this.data = {
                users: {},
                chats: {},
                messages: {}
            };
            this.listeners = {};
            this.loadFromStorage();
        }
        
        loadFromStorage() {
            const saved = localStorage.getItem("cloud_sync_data");
            if (saved) {
                this.data = JSON.parse(saved);
            }
        }
        
        saveToStorage() {
            localStorage.setItem("cloud_sync_data", JSON.stringify(this.data));
        }
        
        async getUser(userId) {
            return this.data.users[userId] || null;
        }
        
        async getUsers() {
            return Object.values(this.data.users);
        }
        
        async saveUser(user) {
            this.data.users[user.id] = user;
            this.saveToStorage();
            this.notifyListeners('users', user);
            return user;
        }
        
        async getChats(userId) {
            const userChats = this.data.chats[userId] || [];
            return userChats;
        }
        
        async saveChat(userId, chat) {
            if (!this.data.chats[userId]) this.data.chats[userId] = [];
            const existing = this.data.chats[userId].find(c => c.id === chat.id);
            if (existing) {
                Object.assign(existing, chat);
            } else {
                this.data.chats[userId].push(chat);
            }
            this.saveToStorage();
            this.notifyListeners('chats', { userId, chat });
            return chat;
        }
        
        async getMessages(chatId) {
            return this.data.messages[chatId] || [];
        }
        
        async saveMessage(chatId, message) {
            if (!this.data.messages[chatId]) this.data.messages[chatId] = [];
            this.data.messages[chatId].push(message);
            this.saveToStorage();
            this.notifyListeners('messages', { chatId, message });
            return message;
        }
        
        on(event, callback) {
            if (!this.listeners[event]) this.listeners[event] = [];
            this.listeners[event].push(callback);
        }
        
        notifyListeners(event, data) {
            if (this.listeners[event]) {
                this.listeners[event].forEach(cb => cb(data));
            }
        }
    }
    
    const cloud = new CloudSync();
    
    let currentUser = null;
    let chats = [];
    let activeChatId = null;
    let currentLang = 'ru';
    let onlineStatus = true;
    
    // Переводы
    const translations = {
        ru: { search: "Поиск пользователей...", placeholder: "Сообщение...", newChat: "Новый чат", settings: "Настройки", empty: "✨ Выберите чат чтобы начать общение ✨", noChats: "Нет чатов", startChat: "Начните чат с пользователем", online: "онлайн", offline: "офлайн", sync: "☁️ Синхронизация", synced: "✓ Синхронизировано" },
        uk: { search: "Пошук користувачів...", placeholder: "Повідомлення...", newChat: "Новий чат", settings: "Налаштування", empty: "✨ Виберіть чат щоб почати спілкування ✨", noChats: "Немає чатів", startChat: "Почніть чат з користувачем", online: "онлайн", offline: "офлайн", sync: "☁️ Синхронізація", synced: "✓ Синхронізовано" },
        be: { search: "Пошук карыстальнікаў...", placeholder: "Паведамленне...", newChat: "Новы чат", settings: "Налады", empty: "✨ Выберыце чат каб пачаць зносіны ✨", noChats: "Няма чатаў", startChat: "Пачніце чат з карыстальнікам", online: "анлайн", offline: "офлайн", sync: "☁️ Сінхранізацыя", synced: "✓ Сінхранізавана" },
        pl: { search: "Szukaj użytkowników...", placeholder: "Wiadomość...", newChat: "Nowy czat", settings: "Ustawienia", empty: "✨ Wybierz czat aby rozpocząć ✨", noChats: "Brak czatów", startChat: "Rozpocznij czat z użytkownikiem", online: "online", offline: "offline", sync: "☁️ Synchronizacja", synced: "✓ Zsynchronizowano" },
        sr: { search: "Претрага корисника...", placeholder: "Порука...", newChat: "Нови чет", settings: "Подешавања", empty: "✨ Изаберите чет да бисте започели ✨", noChats: "Нема четова", startChat: "Започните чет са корисником", online: "онлајн", offline: "офлајн", sync: "☁️ Синхронизација", synced: "✓ Синхронизовано" }
    };
    
    function t(key) {
        return translations[currentLang]?.[key] || translations.ru[key];
    }
    
    function updateLanguage() {
        document.getElementById("searchInput").placeholder = t("search");
        document.getElementById("messageInput").placeholder = t("placeholder");
        document.getElementById("newChatBtn").innerHTML = `<i class="fas fa-plus"></i> ${t("newChat")}`;
        document.getElementById("settingsBtn").innerHTML = `<i class="fas fa-cog"></i> ${t("settings")}`;
        document.getElementById("syncStatus").innerHTML = t("sync");
        if (!activeChatId) {
            document.getElementById("messagesContainer").innerHTML = `<div style="text-align: center; color: #8e8e93; margin-top: 40px;">${t("empty")}</div>`;
        }
    }
    
    // Регистрация с облачной синхронизацией
    async function registerUser(phone, name) {
        let users = await cloud.getUsers();
        let existing = users.find(u => u.phone === phone);
        
        if (existing) {
            existing.name = name;
            existing.lastSeen = Date.now();
            existing.online = true;
            currentUser = existing;
            await cloud.saveUser(currentUser);
        } else {
            currentUser = {
                id: Date.now().toString(),
                phone: phone,
                name: name,
                avatar: name[0].toUpperCase(),
                online: true,
                lastSeen: Date.now(),
                createdAt: Date.now()
            };
            await cloud.saveUser(currentUser);
        }
        
        localStorage.setItem("currentUserId", currentUser.id);
        await loadUserChats();
        return currentUser;
    }
    
    async function loadUserChats() {
        chats = await cloud.getChats(currentUser.id);
        renderChatsList();
        
        // Подписка на новые сообщения
        cloud.on('messages', async (data) => {
            if (activeChatId === data.chatId) {
                renderMessages(activeChatId);
            }
            renderChatsList();
        });
        
        cloud.on('chats', async (data) => {
            if (data.userId === currentUser.id) {
                chats = await cloud.getChats(currentUser.id);
                renderChatsList();
            }
        });
    }
    
    async function renderChatsList() {
        const container = document.getElementById("chatsList");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        
        let filtered = chats.filter(chat => {
            if (chat.type === "private") {
                return chat.name.toLowerCase().includes(searchTerm);
            }
            return chat.name.toLowerCase().includes(searchTerm);
        });
        
        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: #8e8e93;">${t("noChats")}<br>${t("startChat")}</div>`;
            return;
        }
        
        container.innerHTML = "";
        for (let chat of filtered) {
            const msgs = await cloud.getMessages(chat.id);
            const lastMsg = msgs[msgs.length - 1];
            const preview = lastMsg ? (lastMsg.text || "📎 Медиа") : "Нет сообщений";
            
            const chatDiv = document.createElement("div");
            chatDiv.className = "chat-item";
            chatDiv.setAttribute("data-id", chat.id);
            chatDiv.innerHTML = `
                <div class="chat-avatar">
                    ${chat.avatar || chat.name[0]}
                    ${chat.online ? '<span class="online-indicator"></span>' : ''}
                </div>
                <div class="chat-info">
                    <div class="chat-name">
                        ${escapeHtml(chat.name)}
                        ${chat.unread ? `<span class="unread-badge">${chat.unread}</span>` : ''}
                    </div>
                    <div class="chat-preview">${escapeHtml(preview.substring(0, 30))}</div>
                </div>
            `;
            chatDiv.onclick = () => openChat(chat.id);
            container.appendChild(chatDiv);
        }
    }
    
    async function openChat(chatId) {
        activeChatId = chatId;
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        
        document.getElementById("currentChatTitle").innerText = chat.name;
        document.getElementById("chatStatus").innerHTML = chat.online ? `<span class="online-dot"></span> ${t("online")}` : t("offline");
        document.getElementById("inputArea").style.display = "flex";
        await renderMessages(chatId);
        
        if (window.innerWidth <= 768) {
            document.getElementById("sidebar").classList.remove("open");
        }
    }
    
    async function renderMessages(chatId) {
        const container = document.getElementById("messagesContainer");
        const msgs = await cloud.getMessages(chatId);
        msgs.sort((a, b) => a.timestamp - b.timestamp);
        
        if (msgs.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: #8e8e93; margin-top: 40px;">💬 Нет сообщений<br>Напишите что-нибудь!</div>`;
            return;
        }
        
        container.innerHTML = msgs.map(msg => {
            const isOut = msg.senderId === currentUser.id;
            const mediaHtml = msg.fileData ? 
                (msg.fileType?.startsWith("image/") ? `<img class="media-content" src="${msg.fileData}" onclick="window.open(this.src)"/>` : 
                 (msg.fileType?.startsWith("video/") ? `<video class="media-content" controls src="${msg.fileData}"></video>` : 
                  `<a href="${msg.fileData}" download style="color:white;">📎 Скачать файл</a>`)) : '';
            return `
                <div class="message ${isOut ? 'outgoing' : 'incoming'}">
                    <div class="message-text">${escapeHtml(msg.text || "📎 Медиафайл")}</div>
                    ${mediaHtml}
                    <div class="message-meta">
                        <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${msg.read ? '<i class="fas fa-check-double"></i>' : '<i class="fas fa-check"></i>'}
                    </div>
                </div>
            `;
        }).join("");
        container.scrollTop = container.scrollHeight;
        
        document.getElementById("syncStatus").innerHTML = t("synced");
        setTimeout(() => {
            document.getElementById("syncStatus").innerHTML = t("sync");
        }, 2000);
    }
    
    async function sendMessage() {
        if (!activeChatId) return;
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text && !pendingFile) return;
        
        let fileData = null;
        let fileType = null;
        if (pendingFile) {
            fileData = pendingFile.url;
            fileType = pendingFile.type;
            pendingFile = null;
        }
        
        const newMsg = {
            id: Date.now() + "_" + Math.random(),
            senderId: currentUser.id,
            text: text || (fileData ? "📎 Медиафайл" : ""),
            timestamp: Date.now(),
            fileData: fileData,
            fileType: fileType,
            read: false
        };
        
        await cloud.saveMessage(activeChatId, newMsg);
        await renderMessages(activeChatId);
        input.value = "";
        renderChatsList();
    }
    
    async function createNewChat() {
        const users = await cloud.getUsers();
        const otherUsers = users.filter(u => u.id !== currentUser.id);
        
        if (otherUsers.length === 0) {
            alert("Нет других пользователей. Зарегистрируйтесь с другого номера в другой вкладке для теста");
            return;
        }
        
        const userList = otherUsers.map((u, i) => `${i + 1}. ${u.name} (${u.phone})`).join("\n");
        const choice = prompt(`Выберите пользователя для чата:\n${userList}\n\nВведите номер:`);
        if (choice) {
            const index = parseInt(choice) - 1;
            if (otherUsers[index]) {
                const selectedUser = otherUsers[index];
                const existingChat = chats.find(c => c.type === "private" && c.withUserId === selectedUser.id);
                if (existingChat) {
                    openChat(existingChat.id);
                } else {
                    const newChat = {
                        id: "chat_" + Date.now(),
                        type: "private",
                        withUserId: selectedUser.id,
                        name: selectedUser.name,
                        avatar: selectedUser.name[0],
                        online: selectedUser.online || false,
                        createdAt: Date.now()
                    };
                    await cloud.saveChat(currentUser.id, newChat);
                    chats.push(newChat);
                    renderChatsList();
                    openChat(newChat.id);
                }
            }
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }
    
    let pendingFile = null;
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.style.display = "none";
    fileInput.accept = "image/*,video/*,application/pdf,text/plain";
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            pendingFile = { url, type: file.type };
            document.getElementById("messageInput").value = `📎 ${file.name}`;
        }
    };
    document.body.appendChild(fileInput);
    
    // Event listeners
    document.getElementById("loginBtn").onclick = async () => {
        const phone = document.getElementById("phoneInput").value.trim();
        const name = document.getElementById("nameInput").value.trim();
        if (!phone || !name) {
            alert("Пожалуйста, введите номер телефона и имя");
            return;
        }
        await registerUser(phone, name);
        document.getElementById("userName").innerHTML = currentUser.name + '<span class="online-dot"></span>';
        document.getElementById("userPhone").innerText = currentUser.phone;
        document.getElementById("userAvatar").innerText = currentUser.name[0].toUpperCase();
        document.getElementById("authScreen").style.display = "none";
    };
    
    document.getElementById("newChatBtn").onclick = createNewChat;
    document.getElementById("settingsBtn").onclick = () => document.getElementById("settingsModal").classList.add("active");
    document.getElementById("closeModalBtn").onclick = () => {
        currentLang = document.getElementById("languageSelect").value;
        updateLanguage();
        document.getElementById("settingsModal").classList.remove("active");
        renderChatsList();
        if (activeChatId) renderMessages(activeChatId);
    };
    document.getElementById("attachBtn").onclick = () => fileInput.click();
    document.getElementById("sendBtn").onclick = sendMessage;
    document.getElementById("messageInput").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    document.getElementById("menuIcon").onclick = () => document.getElementById("sidebar").classList.add("open");
    document.getElementById("searchInput").addEventListener("input", () => renderChatsList());
    
    // Проверка авторизации
    const savedUserId = localStorage.getItem("currentUserId");
    if (savedUserId) {
        cloud.getUser(savedUserId).then(async (user) => {
            if (user) {
                currentUser = user;
                currentUser.online = true;
                await cloud.saveUser(currentUser);
                document.getElementById("userName").innerHTML = currentUser.name + '<span class="online-dot"></span>';
                document.getElementById("userPhone").innerText = currentUser.phone;
                document.getElementById("userAvatar").innerText = currentUser.name[0].toUpperCase();
                document.getElementById("authScreen").style.display = "none";
                await loadUserChats();
            }
        });
    }
    
    updateLanguage();
    
    // Автообновление
    setInterval(async () => {
        if (currentUser) {
            currentUser.lastSeen = Date.now();
            await cloud.saveUser(currentUser);
        }
        if (activeChatId) {
            await renderMessages(activeChatId);
        }
        renderChatsList();
    }, 3000);
</script>
</body>
</html>
